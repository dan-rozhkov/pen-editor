name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # test:coverage runs the full suite AND enforces the non-regression
      # coverage thresholds in vitest.config.ts (fails if coverage drops).
      - run: npm run test:coverage
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright starts the Vite dev server itself (webServer in
      # playwright.config.ts); /api/chat is stubbed, no backend needed.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # Cross-repo tool contract: checks out the sibling backend repo so the
  # toolContract test actually runs instead of self-skipping.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: pen-editor
      - uses: actions/checkout@v5
        with:
          repository: dan-rozhkov/pen-editor-backend
          path: pen-editor-backend
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pen-editor/package-lock.json
      - run: npm ci
        working-directory: pen-editor
      # The contract test imports ../pen-editor-backend/src/ai/tools.ts, which
      # needs the backend's node_modules (ai, zod) to resolve.
      - run: npm ci
        working-directory: pen-editor-backend
      - run: npx vitest run src/lib/__tests__/toolContract.test.ts
        working-directory: pen-editor
        env:
          CONTRACT_REQUIRE_BACKEND: "1"
