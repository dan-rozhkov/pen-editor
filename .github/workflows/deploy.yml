name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; queue new ones, don't cancel an in-progress
# deploy (which could leave Pages serving a half-updated artifact).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # GitHub Pages serves this repo under /pen-editor/, not "/" — VITE_BASE
      # makes vite.config.ts derive the manifest/workbox/base URLs from the
      # subpath. Local dev/build/e2e are unaffected (VITE_BASE unset there).
      - run: VITE_BASE=/pen-editor/ npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
